<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>D9 CLUBE - PRIME SNIPER V2</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    background:
    radial-gradient(circle at top,#351100 0%,#140707 40%,#060606 100%);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
}

/* =========================
APP
========================= */

.app{
    width:100%;
    max-width:390px;
    height:820px;
    background:#080808;
    border-radius:38px;
    overflow:hidden;
    position:relative;
    border:2px solid rgba(255,180,80,0.15);
    box-shadow:
    0 0 80px rgba(255,100,0,0.15),
    0 20px 60px rgba(0,0,0,0.9);
}

/* =========================
TOP BAR
========================= */

.top-bar{
    height:95px;
    padding:18px 20px;
    background:linear-gradient(to bottom,#111,#1b120b);
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,180,80,0.2);
}

.brand{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo{
    width:45px;
    height:45px;
    border-radius:14px;
    background:linear-gradient(135deg,#ff9d00,#ff3c00);
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:800;
    color:#fff;
    font-size:18px;
    box-shadow:0 0 25px rgba(255,120,0,0.5);
}

.brand h1{
    font-size:24px;
    color:#fff;
    font-weight:800;
    letter-spacing:1px;
}

.brand span{
    display:block;
    color:#ff9d00;
    font-size:11px;
    margin-top:-3px;
    letter-spacing:2px;
}

.menu{
    color:#fff;
    font-size:26px;
}

/* =========================
BACKGROUND EFFECT
========================= */

.hero{
    position:relative;
    height:500px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.glow{
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#ff3c00 0%,transparent 70%);
    opacity:0.4;
    top:20px;
}

.robot-circle{
    width:280px;
    height:280px;
    border-radius:50%;
    background:
    linear-gradient(145deg,#ff3c00,#ff9900);
    padding:6px;
    position:relative;
    z-index:3;
    box-shadow:
    0 0 50px rgba(255,80,0,0.5),
    0 0 120px rgba(255,100,0,0.3);
}

.robot-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

.live-badge{
    position:absolute;
    left:35px;
    top:245px;
    z-index:5;
    background:#1a120c;
    border:1px solid rgba(255,180,80,0.3);
    padding:10px 18px;
    border-radius:30px;
    color:#fff;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:8px;
    box-shadow:0 0 20px rgba(255,120,0,0.2);
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#ff8c00;
    box-shadow:0 0 15px #ff8c00;
}

.small-text{
    margin-top:35px;
    color:#ffb88f;
    letter-spacing:4px;
    font-size:13px;
    z-index:3;
}

.main-title{
    font-size:48px;
    line-height:0.95;
    text-align:center;
    font-weight:900;
    margin-top:12px;
    z-index:3;
    color:white;
    text-shadow:
    0 0 25px rgba(255,255,255,0.15),
    0 0 45px rgba(255,120,0,0.25);
}

.main-title span{
    color:#ffb000;
}

.powered{
    margin-top:30px;
    background:#1b120c;
    border:1px solid rgba(255,180,80,0.25);
    padding:14px 28px;
    border-radius:50px;
    color:white;
    font-weight:600;
    z-index:3;
    box-shadow:0 0 25px rgba(255,100,0,0.15);
}

.powered span{
    color:#ff9d00;
}

/* =========================
SIGNALS
========================= */

.signal-panel{
    position:absolute;
    bottom:105px;
    left:50%;
    transform:translateX(-50%);
    width:88%;
    background:rgba(10,10,10,0.95);
    border:1px solid rgba(255,180,80,0.1);
    border-radius:24px;
    padding:18px;
    backdrop-filter:blur(12px);
    z-index:10;
}

.signal-title{
    color:#ffb88f;
    font-size:12px;
    letter-spacing:2px;
    margin-bottom:15px;
}

.signal-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
    padding:14px;
    border-radius:16px;
    margin-bottom:12px;
}

.time{
    color:white;
    font-weight:700;
    font-size:16px;
}

.mult{
    color:#ffb000;
    font-weight:700;
}

.action-btn{
    margin-top:10px;
    width:100%;
    border:none;
    height:58px;
    border-radius:18px;
    background:linear-gradient(90deg,#ff7b00,#ffb300);
    color:white;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 30px rgba(255,120,0,0.35);
}

.action-btn:hover{
    transform:translateY(-3px);
}

/* =========================
BOTTOM NAV
========================= */

.bottom-nav{
    position:absolute;
    bottom:0;
    width:100%;
    height:85px;
    background:#070707;
    border-top:1px solid rgba(255,180,80,0.1);
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    color:#7d7d7d;
    font-size:12px;
}

.nav-item.active{
    color:#ff9d00;
}

.nav-icon{
    font-size:22px;
}

</style>
</head>

<body>

<div class="app">

    <!-- TOP -->
    <div class="top-bar">

        <div class="brand">
            <div class="logo">D9</div>

            <div>
                <h1>D9 CLUBE</h1>
                <span>AI SIGNAL SYSTEM</span>
            </div>
        </div>

        <div class="menu">☰</div>

    </div>

    <!-- HERO -->
    <div class="hero">

        <div class="glow"></div>

        <div class="robot-circle">
            <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=1200&auto=format&fit=crop" />
        </div>

        <div class="live-badge">
            <div class="dot"></div>
            LIVE
        </div>

        <div class="small-text">
            YOU'RE TRADING WITH
        </div>

        <div class="main-title">
            PRIME SNIPER <span>V2</span>
        </div>

        <div class="powered">
            Powered by <span>D9 CLUBE</span>
        </div>

    </div>

    <!-- SIGNALS -->
    <div class="signal-panel">

        <div class="signal-title">
            HORÁRIOS IDENTIFICADOS
        </div>

        <div id="signals"></div>

        <button class="action-btn" onclick="openPlatform()">
            ENTRAR NA PLATAFORMA 🚀
        </button>

    </div>

    <!-- NAV -->
    <div class="bottom-nav">

        <div class="nav-item active">
            <div class="nav-icon">⌂</div>
            Home
        </div>

        <div class="nav-item">
            <div class="nav-icon">📊</div>
            Stats
        </div>

        <div class="nav-item">
            <div class="nav-icon">⚙</div>
            Settings
        </div>

        <div class="nav-item">
            <div class="nav-icon">❔</div>
            Help
        </div>

    </div>

</div>

<script>

const links = {
    placard: "https://www.placard.co.mz",
    megagamelive: "https://www.megagamelive.com/affiliates/?btag=2504724"
};

function openPlatform(){
    window.open(links.megagamelive, "_blank");
}

function generateSignals(){

    const signals = document.getElementById("signals");
    signals.innerHTML = "";

    let now = new Date();

    for(let i=0;i<4;i++){

        let add = Math.floor(Math.random()*3)+3;
        now.setMinutes(now.getMinutes()+add);

        let h = String(now.getHours()).padStart(2,'0');
        let m = String(now.getMinutes()).padStart(2,'0');

        const multipliers = ["2x+","3x","5x+","4x+"];

        const random =
        multipliers[Math.floor(Math.random()*multipliers.length)];

        const row = document.createElement("div");

        row.className = "signal-row";

        row.innerHTML = `
            <div class="time">${h}:${m}</div>
            <div class="mult">Vela Branca (${random})</div>
        `;

        signals.appendChild(row);
    }
}

generateSignals();

</script>

</body>
</html>
