<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D9 CLUBE - SIGNAL AI</title>
    <style>
        /* Cores inspiradas no app de IA das imagens */
        body {
            background-color: #060913;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            background: linear-gradient(135deg, #0a0f24 0%, #070a17 100%);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d2ff;
            margin: 0 0 5px 0;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .header span {
            font-size: 11px;
            color: #5f6c85;
            text-transform: uppercase;
        }

        /* Seleção de Plataformas */
        .platform-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .platform-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #8fa0c0;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .platform-btn.active {
            background: rgba(0, 210, 255, 0.1);
            border-color: #00d2ff;
            color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        /* Painel de Inteligência */
        .panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .panel-title {
            font-size: 11px;
            color: #5f6c85;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* Lista de Horários */
        .signal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .signal-time {
            font-weight: bold;
            font-size: 15px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .signal-time::before {
            content: "🕒";
            font-size: 12px;
            opacity: 0.6;
        }

        .signal-target {
            font-weight: 600;
            font-size: 14px;
            color: #00ff87;
            text-shadow: 0 0 10px rgba(0, 255, 135, 0.2);
        }

        /* Botão de Ação Principal */
        .btn-main {
            width: 100%;
            background: linear-gradient(90deg, #0072ff 0%, #00d2ff 100%);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 114, 255, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 114, 255, 0.4);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Signal AI</h1>
        <span>Mini App v3.0</span>
    </div>

    <div class="platform-box">
        <button class="platform-btn active" onclick="selectPlatform('placard', this)">Placard</button>
        <button class="platform-btn" onclick="selectPlatform('megagamelive', this)">Megagamelive</button>
    </div>

    <div class="panel">
        <div class="panel-title">Horários Identificados</div>
        <div id="signals-list">
            </div>
    </div>

    <button class="btn-main" id="action-btn" onclick="goToPlatform()">Jogar na Placard 🚀</button>
</div>

<script>
    // Configurações iniciais
    let currentPlatform = 'placard';
    const links = {
        placard: "https://www.placard.co.mz", // Coloque o link correto da Placard aqui se tiver
        megagamelive: "https://www.megagamelive.com/affiliates/?btag=2504724"
    };

    // Função para alternar entre as plataformas
    function selectPlatform(platform, element) {
        currentPlatform = platform;
        
        // Atualiza botões ativos
        document.querySelectorAll('.platform-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        
        // Atualiza o texto do botão de ação inferior
        const btnMain = document.getElementById('action-btn');
        if(platform === 'megagamelive') {
            btnMain.innerText = "Jogar na Megagamelive 🚀";
        } else {
            btnMain.innerText = "Jogar na Placard 🚀";
        }
        
        // Gera novos horários simulando uma nova análise para a casa selecionada
        generateSignals();
    }

    // Redirecionamento do botão
    function goToPlatform() {
        window.open(links[currentPlatform], '_blank');
    }

    // Gerador de Horários Inteligente (Intervalo de 3 a 5 min | 5 Horários | Regra do 3x)
    function generateSignals() {
        const container = document.getElementById('signals-list');
        container.innerHTML = ''; // Limpa a lista anterior
        
        let now = new Date();
        
        for (let i = 0; i < 5; i++) {
            // Gera um intervalo aleatório estrito entre 3 e 5 minutos
            let randomMinutes = Math.floor(Math.random() * (5 - 3 + 1)) + 3;
            now.setMinutes(now.getMinutes() + randomMinutes);
            
            // Formata a hora para HH:MM
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            let timeStr = `${hours}:${minutes}`;
            
            // Define o multiplicador (exemplo: 2x+, 3x, 5x+ etc.)
            let targets = ["2x+", "3x", "4x+", "2x+"];
            let randomTarget = targets[Math.floor(Math.random() * targets.length)];
            
            // Monta o elemento HTML do sinal
            const row = document.createElement('div');
            row.className = 'signal-row';
            row.innerHTML = `
                <div class="signal-time">${timeStr}</div>
                <div class="signal-target">Vela Branca (${randomTarget})</div>
            `;
            
            container.appendChild(row);
        }
    }

    // Executa ao carregar a página pela primeira vez
    window.onload = generateSignals;
</script>

</body>
</html>
