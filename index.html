<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D9 CLUBE - PRIME SNIPER V2</title>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0d0f14;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        /* Container imitando o frame do smartphone da imagem */
        .app-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            max-height: 892px;
            background: radial-gradient(circle at center, #151a26 0%, #0a0c10 100%);
            border-radius: 40px;
            border: 4px solid #1c1f26;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* Status Bar (iPhone Dynamic Island Mockup) */
        .status-bar {
            height: 44px;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            z-index: 10;
            background: #0a0c10;
        }

        .dynamic-island {
            width: 110px;
            height: 30px;
            background: #000000;
            border-radius: 20px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 7px;
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* App Header */
        .app-header {
            padding: 16px 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2a2215 0%, #15110a 100%);
            border: 1px solid #d4af37;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #e5c158;
            font-size: 16px;
            text-shadow: 0 0 8px rgba(229, 193, 88, 0.4);
        }

        .header-text h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .header-text p {
            font-size: 11px;
            color: #707785;
            margin-top: 1px;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #707785;
            font-size: 20px;
            cursor: pointer;
        }

        /* Tabs (Placard / Megagamelive) */
        .tabs-container {
            padding: 0 20px;
            margin-bottom: 12px;
        }

        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #8a93a6;
            padding: 10px 0;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* Seção de Horários Identificados */
        .signals-panel {
            margin: 0 20px 15px 20px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px 16px;
        }

        .panel-title {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .signals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
        }

        .signal-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11.5px;
            color: #d1d5db;
        }

        .signal-item span.time {
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .signal-item span.time::before {
            content: "🕒";
            font-size: 10px;
            opacity: 0.7;
        }

        .signal-item span.target {
            color: #e5c158;
            font-weight: 600;
        }

        /* Target / Radar Hero Section */
        .hero-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding-bottom: 20px;
        }

        .radar-container {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, #10141e 40%, #05070a 100%);
            border: 6px solid #1a1e26;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(229, 193, 88, 0.15), inset 0 0 20px rgba(0,0,0,0.8);
            margin-bottom: 25px;
        }

        /* Brilho dourado externo simétrico ao da imagem */
        .radar-container::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            border: 1px solid rgba(229, 193, 88, 0.4);
            pointer-events: none;
        }

        /* Retículo do Sniper */
        .radar-crosshair {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
        }

            content: '';
            position: absolute;
            top: 15%; bottom: 15%; left: 50%;
            width: 1px;
            background: rgba(229, 193, 88, 0.25);
        }
